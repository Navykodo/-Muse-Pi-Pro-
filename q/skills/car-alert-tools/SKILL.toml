[skill]
name = "car-alert-tools"
description = "异常与报警技能。用户要求发送告警/推送报警/通知 App，或传感器/视觉/哨兵/巡逻/环境观察检测到异常时使用。视觉类可复核异常不能只凭第一次画面就告警，必须按 camera-snap-tools 做二次确认；两次同类异常才算 confirmed_abnormal 并发送告警。明显明火/正在燃烧、硬件传感器明确异常、用户明确要求测试告警、或其它 skill 已声明 confirmed_abnormal 时可以直接告警。明确异常包括火焰/明火/疑似起火、烟雾/异常雾气、积水/漏水、裸露线缆/电气异常、悬空边缘/坑洞、贴近车体或阻挡运动的障碍物、门窗异常、入侵/陌生人异常进入、人员异常靠近、人员摔倒/倒地/躺在地上/趴在地上/长时间异常静止，以及视觉描述明确写出异常/危险/需要检查。正常家具、普通人员正常坐立行走、常规门窗状态、地面不可见或光线偏暗不直接算异常。当前告警 API 是原始 TCP 字节流，不是 HTTP；地址由部署环境的 ALERT_TCP_HOST/ALERT_TCP_PORT 配置。推荐调用部署环境中配置好的 send_alert.py LEVEL EVENT，LEVEL 只能是 info/warning/danger，EVENT 是 App 显示的单行告警文本。禁止使用 browser、curl、http_request 访问该端口；如果当前可用工具没有 shell 或 TCP/socket 发送能力，必须说明无法发送，不能伪造已发送。"
version = "1.3.0"
author = "local-user"
tags = ["alert", "tcp", "app", "sentry", "robot", "notification"]

prompts = ['''
你可以使用 car-alert-tools 技能处理“异常与报警”。

触发场景：
- 用户明确要求“发送告警 / 推送报警 / 通知 App / 发一个火焰告警 / 发一个哨兵提示”。
- 硬件传感器明确上报异常。
- 视觉、哨兵、巡逻、导航观察或环境检测结果中出现 confirmed_abnormal。
- 视觉观察到明显明火、正在燃烧、爆炸等不能等待的高危场景。
- 其它 skill 明确要求“发现异常后调用告警 skill”。

什么是异常：
- 火焰、明火、疑似起火、烧焦烟雾。
- 烟雾、浓雾、异常雾气、明显空气异常。
- 积水、大面积水渍、漏水、地面湿滑风险。
- 裸露线缆、电线散落、电气设备异常、疑似短路火花。
- 悬空边缘、台阶边缘、坑洞、可能导致小车跌落的位置。
- 明显贴近车体、阻挡运动或可能碰撞的障碍物。
- 门窗异常打开、破损、遮挡异常、门外/走廊出现异常物体。
- 入侵者、陌生人异常进入、人员异常靠近设备。
- 人员摔倒、倒地、躺在地上、趴在地上、长时间异常静止。
- 视觉描述里明确出现“异常”“危险”“需要检查”“疑似事故”“不安全”等判断。

视觉二次确认：
- 视觉首次发现烟雾、异常雾气、积水、裸露线缆、人员摔倒/倒地/躺地/趴地、门窗异常、入侵、人员异常靠近、障碍物等可复核异常时，不要立即告警。
- 必须按 camera-snap-tools 对同一地点/方向补拍确认一次。
- 两次同类异常才算 confirmed_abnormal，才能发送告警。
- 第二次未复现同类异常时，标记为 unconfirmed_suspect，不发送告警。
- 明显明火、正在燃烧、爆炸或人员处于直接危险中，可以跳过二次确认直接告警。

通常不算异常：
- 普通家具、桌椅、柜子、墙面、窗帘、正常堆放物。
- 人员正常坐着、站着、走动，且没有异常姿态或危险动作。
- 地面不可见、光线偏暗、画面有普通遮挡；这些只能说“不确定”，不能直接告警。

强制规则：
- confirmed_abnormal、硬件传感器明确异常、明显明火高危场景或用户测试告警时必须发送告警，不能只在最终回复里说明。
- 视觉首次可复核异常如果还没有二次确认，必须先补拍确认，不能直接告警。
- unconfirmed_suspect 不发送告警，只在最终回复里简短说明。
- 如果当前还有小车运动或巡逻任务，应先按对应 skill 停止小车，再发送告警。
- 发送失败时报告真实失败原因，不能伪造已发送。

协议边界：
- 这是原始 TCP 字节流，不是 HTTP。
- 告警地址由部署环境的 ALERT_TCP_HOST/ALERT_TCP_PORT 配置。
- 不要默认假设本地端口或公开端口。
- 服务端是广播转发模型，只转发给当前在线客户端；App 不在线时不会补发历史消息。
- 禁止用 browser、curl、http_request 访问该端口。
- 禁止把 HTTP 200、网页打开成功、浏览器结果当成告警发送成功。

推荐发送方式：
- 优先使用部署环境中配置好的告警发送脚本 send_alert.py。
- 脚本只接受两个位置参数：
  send_alert.py LEVEL EVENT
- LEVEL 只能是 info、warning、danger。
- EVENT 是 App 弹窗和通知显示的告警事件文本。
- 不要再使用旧参数：--level、--code、--host、--port、--timeout、--repeat、--interval、--no-ts、--extra、--dry-run。

示例：
send_alert.py danger "检测到火焰，请立即检查"
send_alert.py warning "前方检测到障碍物"
send_alert.py info "哨兵模式已开启"

底层数据格式：
- 每条告警必须是“一行 JSON + 换行符 \n”。
- JSON 必须使用 UTF-8。
- type 固定为 "alert"。
- level 只能是 "info"、"warning"、"danger"。
- message 是人类可读告警文本。
- 当前格式不要添加 code、ts、extra 或其它字段。

示例 payload：
{"type":"alert","level":"danger","message":"检测到火焰，请立即检查"}

关键注意事项：
- JSON 中间不能有真实换行。
- 只能在最后有一个换行符，用来通知 App 一条消息结束。
- 如果 EVENT 来自多行文本，必须压缩成单行再发送；真实换行会导致 App 按多条无效数据解析。
- 中文消息可以发送，推荐交给 send_alert.py 生成 JSON。

等级建议：
- 火焰、烟雾、积水、疑似起火：默认 danger。
- 人员摔倒、倒地、躺在地上、趴在地上：至少 warning；疑似受伤、无法移动或伴随其它危险时用 danger。
- 裸露线缆、悬空边缘、电气异常：默认 warning；明确危险时用 danger。
- 入侵、人员异常靠近、门窗异常：默认 warning；明确危险时用 danger。
- 障碍物：默认 warning；贴近车体、阻挡运动或可能碰撞时用 danger。
- 普通状态提示：默认 info。

成功判断：
- send_alert.py 退出码为 0，并输出 sent: LEVEL -> EVENT，才可说“告警已发送”。
- 如果脚本返回非 0、连接失败、超时、BrokenPipe、ConnectionRefused 或发送异常，必须报告真实错误。
- 发送成功只代表 TCP 数据已发送到广播服务，不代表 App 一定已展示；App 必须处于“告警 TCP 已连接”状态。

如果没有脚本或 shell：
- 如果当前工具集没有 shell，也没有 TCP/socket 发送能力，不要尝试 http_request、curl、browser 或其它备用方式。
- 直接说明“当前工具集没有可用的原始 TCP 发送能力，无法发送告警”。

回复规则：
- 简短说明 level、message、发送是否成功。
- 不再输出或要求 code、ts。
- 不输出过长原始 JSON；必要时只列关键字段。
- 不展示内部思考过程。
''']
