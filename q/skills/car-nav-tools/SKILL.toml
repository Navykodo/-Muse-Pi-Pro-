[skill]
name = "car-nav-tools"
description = "小车 Nav2 定向导航技能。用于用户要求导航到地图坐标或语义地点，例如“去 window / 去 doorway / 去 front_door_in / 去 front_door_out / 去 workstation_1 / 到门口 / 到门外走廊 / 导航到 x,y / 去窗户巡查”。必须只通过 http_request POST http://127.0.0.1:8765/tool 调用 Hardware API，不要直接调用 8788、ROS2、cmd_vel、shell 或 curl。当前语义导航地图数据是 room_open；地点导航必须先 car_nav_places {\"map_name\":\"room_open\"} 确认当前地点表，再 car_nav_place 用 map_name=\"room_open\" 提交。latest 只是兼容别名，不要在新测试指令里优先使用 latest。必须区分“室内门口/门边拍照”和“门外/走廊/出去门外”：front_door_in 是室内门口通行/观察点，front_door_out 是室内门口朝门外拍照点，front_door 是兼容旧名字且等同 front_door_in；doorway 是门外/走廊观察点。用户说到门口、门边、门那里时用 front_door_in；用户明确说朝门外看、拍门外时用 front_door_out；用户说门外、走廊、出去看、到门外走廊时用 doorway，不能只在室内门口拍照冒充门外。当前 room_open 地点包括 desk、doorway、front_door_in、front_door_out、front_door、window、workstation_1、workstation_2、workstation_3、workstation_4、workstation_4_upper，其中 indoor targets 带 via_rules：靠近 doorway 时 ROS2 API 会自动经由 front_door_in，不要自己传 via 参数或硬编码坐标。坐标导航才用 car_nav_goal。car_nav_place/car_nav_goal 的 completion_ok=true 只表示目标已接收，completion_meaning=accepted_not_arrived，不表示已经到达。提交后必须调用 car_nav_wait，args 必须固定为 {\"timeout_sec\":25,\"poll_interval_sec\":5}，禁止改成 30 或其它更大值；如果 wait_result=timeout 且 nav_state=running，最多再用同样 args 调用 2 次 car_nav_wait。完成只看 nav_state/nav_done/nav_ok：success+done+ok 才算到达，failed 或 done 且 ok=false 要 car_nav_stop 并报告 nav_result。任一 car_nav_wait/http_request 返回 HTTP 400、工具失败、参数错误或限流时，立即 car_nav_stop 并总结真实失败原因，禁止改用 car_nav_status 快速轮询、car_move、car_turn、car_nav_goal 或重复提交目标来补救。导航任务中禁止 car_move/car_turn，除非用户在新请求中明确要求手动移动。若用户要求巡查/看看有没有异常，导航成功后读取 camera-snap-tools 做 camera_describe；若观察首次发现可复核视觉异常，按 camera-snap-tools 二次确认，两次同类异常才读取 car-alert-tools 告警；若光线不足，按 camera-snap-tools 联动灯控补拍。若导航未成功，只能说明未到达；可在 car_nav_stop 后观察当前位置，但必须标注不是目标地点观察。"
version = "1.0.7"
author = "local-user"
tags = ["car", "robot", "nav2", "navigation", "hardware"]
